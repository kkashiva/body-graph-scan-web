// ─── Utility: generate smooth path through waypoints ──────────────────
// Uses Catmull-Rom → Cubic Bezier conversion for smooth curves
function catmullRomToBezier(points, closed = true) {
  const n = points.length;
  if (n < 2) return '';
  
  let d = `M ${points[0][0]} ${points[0][1]}`;
  
  for (let i = 0; i < n - 1; i++) {
    const p0 = points[i === 0 ? (closed ? n - 1 : 0) : i - 1];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[i + 2 >= n ? (closed ? (i + 2) % n : n - 1) : i + 2];
    
    const tension = 0.35;
    const cp1x = p1[0] + (p2[0] - p0[0]) * tension;
    const cp1y = p1[1] + (p2[1] - p0[1]) * tension;
    const cp2x = p2[0] - (p3[0] - p1[0]) * tension;
    const cp2y = p2[1] - (p3[1] - p1[1]) * tension;
    
    d += ` C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)}, ${cp2x.toFixed(1)} ${cp2y.toFixed(1)}, ${p2[0]} ${p2[1]}`;
  }
  
  if (closed) d += ' Z';
  return d;
}

// ─── Render ──────────────────────
function renderSilhouette(svgId, outlinePoints, clothingPaths) {
  const svg = document.getElementById(svgId);
  const ns = 'http://www.w3.org/2000/svg';
  
  // Body outline
  const g = document.createElementNS(ns, 'g');
  g.setAttribute('fill', 'rgba(255, 2, 131, 0.15)');
  g.setAttribute('stroke', 'rgba(255, 2, 131, 0.85)');
  g.setAttribute('stroke-width', '0.5');
  g.setAttribute('stroke-linejoin', 'round');
  g.setAttribute('stroke-linecap', 'round');
  
  const bodyPath = document.createElementNS(ns, 'path');
  bodyPath.setAttribute('d', catmullRomToBezier(outlinePoints, true));
  g.appendChild(bodyPath);
  
  // Clothing detail lines
  for (const cp of clothingPaths) {
    const p = document.createElementNS(ns, 'path');
    p.setAttribute('d', cp);
    p.setAttribute('fill', 'none');
    g.appendChild(p);
  }
  
  svg.appendChild(g);
}
